<head>

<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#090909;--panel:#111;--panel2:#161616;--border:#1f1f1f;--b2:#2a2a2a;
  --text:#c8c8c8;--t2:#787878;--t3:#3a3a3a;--white:#ebebeb;
  --amb:#f0a500;--pos:#4caf7d;--neg:#e05050;--neu:#6699bb;
  --nav:56px;
}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:'IBM Plex Mono',monospace;font-size:12px;display:flex;flex-direction:column}

/* ── HEADER ── */
.hdr{
background:#000;border-bottom:1px solid #1a1a1a;
padding:11px 16px 10px;flex-shrink:0;
display:flex;align-items:center;justify-content:space-between;
}
.hdr-l{display:flex;align-items:baseline;gap:10px}
.hdr-logo{font-family:‘IBM Plex Sans’,sans-serif;font-weight:700;font-size:13px;color:var(–amb);letter-spacing:.04em}
.hdr-sub{font-size:9px;color:var(–t3);letter-spacing:.06em}
.hdr-val{text-align:right}
.hdr-days{font-family:‘IBM Plex Sans’,sans-serif;font-size:22px;font-weight:700;color:var(–amb);line-height:1}
.hdr-dlbl{font-size:8px;color:var(–t2);text-transform:uppercase;letter-spacing:.08em;margin-top:2px}

/* ── SCROLL AREA ── */
.scroll{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding-bottom:var(–nav)}

/* ── KPI STRIP ── */
.kpi-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:1px;background:var(–border);border-bottom:1px solid var(–border)}
.kc{background:var(–panel);padding:12px 13px}
.kl{font-size:8px;text-transform:uppercase;letter-spacing:.09em;color:var(–t3);margin-bottom:3px;line-height:1.3}
.kv{font-size:15px;font-weight:600;color:var(–white);line-height:1}
.ks{font-size:8px;color:var(–t3);margin-top:3px}
.amb{color:var(–amb)}.pos{color:var(–pos)}.neg{color:var(–neg)}.neu{color:var(–neu)}

/* ── SECTION TITLE ── */
.sec{font-size:8px;text-transform:uppercase;letter-spacing:.14em;color:var(–t3);
padding:10px 16px 6px;border-top:1px solid var(–border)}

/* ── CHARTS ── */
.chart-block{background:var(–panel);padding:14px 14px 10px;border-bottom:1px solid var(–border)}
.ct{font-size:8px;text-transform:uppercase;letter-spacing:.1em;color:var(–t3);margin-bottom:10px}

/* ── MONTH CARDS ── */
.cards{padding:0 0 6px}
.card{background:var(–panel);border-bottom:1px solid var(–border);padding:14px 16px;cursor:pointer}
.card-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:0}
.card-month{font-family:‘IBM Plex Sans’,sans-serif;font-size:14px;font-weight:600;color:var(–white)}
.card-delay{font-size:11px;font-weight:500}
.card-tag{font-size:8px;padding:2px 7px;border-radius:2px;margin-left:6px;letter-spacing:.04em}
.tag-r{background:rgba(76,175,125,.12);color:var(–pos)}
.tag-m{background:rgba(102,153,187,.12);color:var(–neu)}
.tag-l{background:rgba(224,80,80,.12);color:var(–neg)}
.tag-n{background:rgba(60,60,60,.5);color:var(–t3)}
.card-body{display:grid;grid-template-columns:1fr 1fr;gap:6px 16px;margin-top:10px}
.cf{display:flex;flex-direction:column;gap:2px}
.cf-l{font-size:8px;text-transform:uppercase;letter-spacing:.08em;color:var(–t3)}
.cf-v{font-size:12px;font-weight:500;color:var(–text)}
.card-bar{margin-top:10px;height:6px;background:var(–border);border-radius:3px;overflow:hidden}
.card-bar-fill{height:100%;border-radius:3px;transition:width .3s}
.card-chevron{font-size:10px;color:var(–t3);transition:transform .25s}
.card.open .card-chevron{transform:rotate(180deg)}
.card-extra{display:none;margin-top:10px;padding-top:10px;border-top:1px solid var(–border)}
.card.open .card-extra{display:block}
.card-extra-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px 16px}
.ce{display:flex;flex-direction:column;gap:2px}
.ce-l{font-size:8px;text-transform:uppercase;letter-spacing:.08em;color:var(–t3)}
.ce-v{font-size:11px;color:var(–t2)}

/* ── QUEUE SECTION ── */
.q-list{padding:10px 16px 4px}
.q-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.q-lbl{width:26px;font-size:9px;color:var(–t3);text-align:right;flex-shrink:0}
.q-outer{flex:1;background:#1a1a1a;height:24px;border-radius:2px;overflow:hidden;position:relative}
.q-bar{height:100%;display:flex;position:absolute;top:0;left:0}
.q-seg{height:100%}
.q-val{width:52px;text-align:right;font-size:9px;color:var(–t2);font-weight:500}
.q-leg{display:flex;flex-wrap:wrap;gap:8px 14px;padding:8px 16px 12px}
.li{display:flex;align-items:center;gap:5px;font-size:9px}
.ld{width:9px;height:9px;border-radius:2px;flex-shrink:0}

/* ── VERIFY CARDS ── */
.ver-cards{display:flex;flex-direction:column;gap:1px;background:var(–border);margin-bottom:1px}
.vc{background:var(–panel);padding:14px 16px}
.vcl{font-size:8px;text-transform:uppercase;letter-spacing:.1em;color:var(–t3);margin-bottom:5px}
.vcv{font-size:20px;font-weight:600;color:var(–white);margin-bottom:4px}
.vcn{font-size:9px;color:var(–t3);line-height:1.7}
.bok{color:var(–pos)}.bko{color:var(–neg)}

/* ── BOTTOM NAV ── */
.nav{
position:fixed;bottom:0;left:0;right:0;height:var(–nav);
background:#000;border-top:1px solid #1a1a1a;
display:grid;grid-template-columns:repeat(4,1fr);
z-index:100;
}
.nav-btn{
display:flex;flex-direction:column;align-items:center;justify-content:center;
gap:3px;border:none;background:none;color:var(–t3);
font-family:‘IBM Plex Mono’,monospace;font-size:7px;
text-transform:uppercase;letter-spacing:.07em;cursor:pointer;
padding:6px 4px;transition:color .15s;
}
.nav-btn .icon{font-size:18px;line-height:1}
.nav-btn.active{color:var(–amb)}

/* ── PANELS ── */
.pnl{display:none}.pnl.active{display:block}
</style>

</head>

  </div>

    <div class="cards" id="cardsContainer"></div>

    <span class="icon">▦</span><span>File</span>

<script>
// ══════════════════════════════════════════════════════════════
// DATA
// ══════════════════════════════════════════════════════════════
const BOP_SEED = 12217707.01;
const raw = [
  {m:'Jan', bop:12217707.01, collecte:20517300,    dette:0,            acq_live:0,           acq_soc:248008.68,   eop:25571192.50},
  {m:'Fév', bop:25571192.50, collecte:21815148,    dette:0,            acq_live:15920170.92, acq_soc:762328.45,   eop:26034334.17},
  {m:'Mar', bop:26034334.17, collecte:31229136,    dette:0,            acq_live:38876168.49, acq_soc:329225.37,   eop:21431295.55},
  {m:'Avr', bop:21431295.55, collecte:26058348,    dette:0,            acq_live:0,           acq_soc:0,           eop:30398473.59},
  {m:'Mai', bop:30398473.59, collecte:11911356,    dette:0,            acq_live:0,           acq_soc:565837.65,   eop:40198081.78},
  {m:'Jun', bop:40198081.78, collecte:14265516,    dette:0,            acq_live:20463479.86, acq_soc:1172366.99,  eop:16212110.71},
  {m:'Juil',bop:16212110.71, collecte:13993176,    dette:0,            acq_live:0,           acq_soc:1056669.10,  eop:27077784.46},
  {m:'Aoû', bop:27077784.46, collecte:8765268,     dette:0,            acq_live:32160972.50, acq_soc:481836.38,   eop:25267985.07},
  {m:'Sep', bop:25267985.07, collecte:9786696,     dette:20000000,     acq_live:46354277.57, acq_soc:251551.50,   eop:22613606.89},
  {m:'Oct', bop:22613606.89, collecte:16059492,    dette:0,            acq_live:0,           acq_soc:1172568.77,  eop:35010128.68},
  {m:'Nov', bop:35010128.68, collecte:11623308,    dette:0,            acq_live:9081505.43,  acq_soc:514230.56,   eop:35010128.68},
  {m:'Déc', bop:35010128.68, collecte:12577212,    dette:121575223.47, acq_live:139215659.00,acq_soc:1130865.73,  eop:23764748.04},
].map(d=>({...d, acq: d.acq_live+d.acq_soc}));

// ══════════════════════════════════════════════════════════════
// FIFO ENGINE
// ══════════════════════════════════════════════════════════════
function runFIFO(){
  let queue=[{amount:BOP_SEED,label:'BOP',monthIdx:0}];
  let carry=0;
  const res=[],snaps=[];
  for(let t=0;t<raw.length;t++){
    const d=raw[t];
    queue.push({amount:d.collecte,label:d.m,monthIdx:t});
    const carryIn=carry;
    const totalDebtAvail=d.dette+carry;
    const equityImmo=Math.max(0,d.acq-totalDebtAvail);
    const carryOut=Math.max(0,totalDebtAvail-d.acq);
    const detteNette=Math.min(totalDebtAvail,d.acq);
    carry=carryOut;
    let toConsume=equityImmo,wSum=0,consumed=0;
    const batches=[];
    while(toConsume>1e-6&&queue.length>0){
      const o=queue[0];
      const age=t-o.monthIdx;
      const take=Math.min(o.amount,toConsume);
      wSum+=take*age;consumed+=take;
      batches.push({amount:take,label:o.label,monthIdx:o.monthIdx,age});
      o.amount-=take;
      if(o.amount<1e-6)queue.shift();
      toConsume-=take;
    }
    const avgM=consumed>0?wSum/consumed:null;
    const avgD=avgM!=null?Math.round(avgM*30.4):null;
    const qT=queue.reduce((s,b)=>s+b.amount,0);
    res.push({...d,t,carryIn,detteNette,equityImmo,carryOut,consumed,batches,avgM,avgD,qT});
    snaps.push(queue.map(b=>({...b})));
  }
  return{res,snaps,finalQueue:queue.slice()};
}
const {res,snaps,finalQueue}=runFIFO();

// ══════════════════════════════════════════════════════════════
// HELPERS
// ══════════════════════════════════════════════════════════════
const fmtM  = v=>(v/1e6).toFixed(1)+'M';
const fmtM2 = v=>(v/1e6).toFixed(2)+'M€';
const fmtK  = v=>v>=1e6?fmtM2(v):(v/1e3).toFixed(0)+'k€';
const months=raw.map(d=>d.m);
const totalCollecte=raw.reduce((s,d)=>s+d.collecte,0);
const totalAcq=raw.reduce((s,d)=>s+d.acq,0);
const totalDette=raw.reduce((s,d)=>s+d.dette,0);
const totalEquity=res.reduce((s,r)=>s+r.equityImmo,0);
const totalConsumed=res.reduce((s,r)=>s+r.consumed,0);
const remaining=finalQueue.reduce((s,b)=>s+b.amount,0);
let tw=0,tc=0;
res.forEach(r=>{tw+=r.consumed*(r.avgM||0);tc+=r.consumed;});
const gAvgM=tc>0?tw/tc:0;
const gAvgD=Math.round(gAvgM*30.4);

document.getElementById('hDays').textContent=gAvgD+'J';

// ══════════════════════════════════════════════════════════════
// COLORS
// ══════════════════════════════════════════════════════════════
const COLS=[
  'rgba(240,165,0,0.90)',   // BOP
  'rgba(74,170,116,0.85)',  // Jan
  'rgba(85,150,210,0.85)',  // Fév
  'rgba(210,90,90,0.85)',   // Mar
  'rgba(170,100,210,0.85)', // Avr
  'rgba(240,200,50,0.85)',  // Mai
  'rgba(50,195,190,0.85)',  // Jun
  'rgba(230,130,50,0.85)',  // Juil
  'rgba(130,190,80,0.85)',  // Aoû
  'rgba(100,160,220,0.85)', // Sep
  'rgba(210,80,140,0.85)',  // Oct
  'rgba(160,220,180,0.85)', // Nov
  'rgba(255,165,100,0.85)', // Déc
];
const allLbls=['BOP',...months];
const getC=lbl=>COLS[allLbls.indexOf(lbl)]||'rgba(90,90,90,0.4)';

// ══════════════════════════════════════════════════════════════
// KPI GRID
// ══════════════════════════════════════════════════════════════
const kpis=[
  {l:'Délai moyen',    v:gAvgD+'J',               s:gAvgM.toFixed(1)+'m',        c:'amb'},
  {l:'Collecte tot.',  v:fmtM(totalCollecte)+'€', s:'+ seed '+fmtM(BOP_SEED)+'€',c:''},
  {l:'Equity immo',    v:fmtM(totalEquity)+'€',   s:'Acq − Dette',               c:'pos'},
  {l:'% déployé',      v:(totalConsumed/(BOP_SEED+totalCollecte)*100).toFixed(0)+'%',s:fmtM(totalConsumed)+'€', c:'pos'},
  {l:'File résid.',    v:fmtM(remaining)+'€',      s:'Non investi',               c:'neg'},
  {l:'EOP déc.',       v:fmtM(raw[11].eop)+'€',   s:'31/12/2025',                c:'amb'},
];
document.getElementById('kpiGrid').innerHTML=kpis.map(k=>`
  <div class="kc">
    <div class="kl">${k.l}</div>
    <div class="kv ${k.c}">${k.v}</div>
    <div class="ks">${k.s}</div>
  </div>`).join('');

// ══════════════════════════════════════════════════════════════
// CHART DEFAULTS
// ══════════════════════════════════════════════════════════════
Chart.defaults.color='#444';
Chart.defaults.font.family="'IBM Plex Mono',monospace";
Chart.defaults.font.size=9;
const grd={color:'#191919',drawBorder:false};
const tip={
  backgroundColor:'#000',borderColor:'#2a2a2a',borderWidth:1,
  titleColor:'#787878',bodyColor:'#c8c8c8',padding:10,cornerRadius:2,
  titleFont:{family:"'IBM Plex Mono',monospace",size:10},
  bodyFont:{family:"'IBM Plex Mono',monospace",size:10},
};

// ══════════════════════════════════════════════════════════════
// CHART: Cumul
// ══════════════════════════════════════════════════════════════
(()=>{
  let cC=0,cE=0;
  const dC=[],dE=[],dS=[];
  res.forEach(r=>{cC+=r.collecte;cE+=r.equityImmo;
    dC.push(BOP_SEED+cC);dE.push(cE);dS.push((BOP_SEED+cC)-cE);});
  new Chart(document.getElementById('cCumul'),{
    type:'line',
    data:{labels:months,datasets:[
      {label:'Seed+Collecte cum.',data:dC,borderColor:'rgba(74,170,116,.9)',borderWidth:2,pointRadius:3,pointBackgroundColor:'rgba(74,170,116,.9)',fill:false,tension:.3},
      {label:'Equity investie cum.',data:dE,borderColor:'rgba(240,165,0,.9)',borderWidth:2,pointRadius:3,pointBackgroundColor:'rgba(240,165,0,.9)',fill:false,tension:.3},
      {label:'Solde non investi',data:dS,borderColor:'rgba(224,80,80,.7)',backgroundColor:'rgba(224,80,80,.07)',borderWidth:1.5,borderDash:[5,3],pointRadius:2,fill:true,tension:.3},
    ]},
    options:{responsive:true,plugins:{
      legend:{labels:{boxWidth:7,padding:10,color:'#555',font:{size:9}}},
      tooltip:{...tip,callbacks:{label:ctx=>` ${ctx.dataset.label}: ${fmtM2(ctx.raw)}`}}
    },scales:{x:{grid:grd,ticks:{color:'#444',maxRotation:0}},y:{grid:grd,ticks:{callback:v=>fmtM(v),color:'#444'}}}}
  });
})();

// ══════════════════════════════════════════════════════════════
// CHART: Delay
// ══════════════════════════════════════════════════════════════
new Chart(document.getElementById('cDelay'),{
  type:'bar',
  data:{labels:months,datasets:[{
    label:'Délai (j)',
    data:res.map(r=>r.avgD),
    backgroundColor:res.map(r=>r.avgD==null?'rgba(50,50,50,.5)':r.avgD<45?'rgba(76,175,125,.7)':r.avgD<90?'rgba(240,165,0,.7)':'rgba(224,80,80,.7)'),
    borderRadius:2,borderWidth:0,
  }]},
  options:{responsive:true,plugins:{
    legend:{display:false},
    tooltip:{...tip,callbacks:{label:ctx=>ctx.raw==null?' —':` ${ctx.raw}J`}}
  },scales:{x:{grid:grd,ticks:{color:'#444',maxRotation:0}},y:{grid:grd,ticks:{callback:v=>v+'J',color:'#444'},suggestedMax:150}}}
});

// ══════════════════════════════════════════════════════════════
// CHART: Queue
// ══════════════════════════════════════════════════════════════
new Chart(document.getElementById('cQueue'),{
  type:'bar',
  data:{labels:months,datasets:[{
    label:'File',data:snaps.map(q=>q.reduce((s,b)=>s+b.amount,0)),
    backgroundColor:'rgba(102,153,187,.3)',borderColor:'rgba(102,153,187,.5)',borderWidth:1,borderRadius:2,
  }]},
  options:{responsive:true,plugins:{
    legend:{display:false},
    tooltip:{...tip,callbacks:{label:ctx=>` ${fmtM2(ctx.raw)}`}}
  },scales:{x:{grid:grd,ticks:{color:'#444',maxRotation:0}},y:{grid:grd,ticks:{callback:v=>fmtM(v),color:'#444'}}}}
});

// ══════════════════════════════════════════════════════════════
// CHART: Stacked
// ══════════════════════════════════════════════════════════════
const sDS=allLbls.map((lbl,i)=>({
  label:lbl,
  data:res.map(r=>{const b=r.batches.find(x=>x.label===lbl);return b?b.amount:0;}),
  backgroundColor:COLS[i]||'rgba(90,90,90,.4)',
  borderWidth:0,stack:'eq',
}));
new Chart(document.getElementById('cStack'),{
  type:'bar',data:{labels:months,datasets:sDS},
  options:{responsive:true,plugins:{
    legend:{labels:{boxWidth:7,padding:8,color:'#555',font:{size:8},filter:item=>sDS[item.datasetIndex].data.some(v=>v>0)}},
    tooltip:{...tip,callbacks:{label:ctx=>` ${ctx.dataset.label}: ${fmtM2(ctx.raw)}`}}
  },scales:{x:{grid:grd,stacked:true,ticks:{color:'#444',maxRotation:0}},y:{grid:grd,stacked:true,ticks:{callback:v=>fmtM(v),color:'#444'}}}}
});

// ══════════════════════════════════════════════════════════════
// MONTH CARDS
// ══════════════════════════════════════════════════════════════
const maxEq=Math.max(...res.map(r=>r.equityImmo));
document.getElementById('cardsContainer').innerHTML=res.map((r,i)=>{
  const noAcq=r.equityImmo<1e-3;
  const tag=noAcq?`<span class="card-tag tag-n">AUCUNE ACQ</span>`:
    r.avgD<45?`<span class="card-tag tag-r">RAPIDE</span>`:
    r.avgD<90?`<span class="card-tag tag-m">MOYEN</span>`:
              `<span class="card-tag tag-l">LENT</span>`;
  const delayTxt=noAcq?`<span style="color:var(--t3)">—</span>`:
    `<span style="color:${r.avgD<45?'var(--pos)':r.avgD<90?'var(--amb)':'var(--neg)'}">${r.avgD}J</span>`;
  const barW=maxEq>0?(r.equityImmo/maxEq*100).toFixed(1):0;
  const barCol=noAcq?'#2a2a2a':r.avgD<45?'var(--pos)':r.avgD<90?'var(--amb)':'var(--neg)';

  return `<div class="card" id="card-${i}" onclick="toggleCard(${i})">
    <div class="card-head">
      <div style="display:flex;align-items:center;gap:8px">
        <div class="card-month">${r.m}</div>
        ${tag}
      </div>
      <div style="display:flex;align-items:center;gap:8px">
        ${delayTxt}
        <span class="card-chevron" id="chev-${i}">▾</span>
      </div>
    </div>
    <div class="card-bar"><div class="card-bar-fill" style="width:${barW}%;background:${barCol}"></div></div>
    <div class="card-body">
      <div class="cf">
        <div class="cf-l">BOP</div>
        <div class="cf-v" style="color:var(--t2)">${fmtM2(r.bop)}</div>
      </div>
      <div class="cf">
        <div class="cf-l">Collecte</div>
        <div class="cf-v pos">${fmtM2(r.collecte)}</div>
      </div>
      <div class="cf">
        <div class="cf-l">Acq totale</div>
        <div class="cf-v" style="color:${r.acq>0?'var(--text)':'var(--t3)'}">${r.acq>0?fmtM2(r.acq):'—'}</div>
      </div>
      <div class="cf">
        <div class="cf-l">Equity immo</div>
        <div class="cf-v pos">${r.equityImmo>0?fmtM2(r.equityImmo):'<span style="color:var(--t3)">—</span>'}</div>
      </div>
    </div>
    <div class="card-extra" id="extra-${i}">
      <div class="card-extra-grid">
        <div class="ce"><div class="ce-l">Acq Live</div><div class="ce-v">${r.acq_live>0?'−'+fmtM2(r.acq_live):'—'}</div></div>
        <div class="ce"><div class="ce-l">Acq Social</div><div class="ce-v">${r.acq_soc>0?'−'+fmtM2(r.acq_soc):'—'}</div></div>
        <div class="ce"><div class="ce-l">Dette</div><div class="ce-v" style="color:${r.dette>0?'var(--amb)':'var(--t3)'}">${r.dette>0?fmtM2(r.dette):'—'}</div></div>
        <div class="ce"><div class="ce-l">Carry in</div><div class="ce-v" style="color:${r.carryIn>0?'var(--amb)':'var(--t3)'}">${r.carryIn>0?fmtM2(r.carryIn):'—'}</div></div>
        <div class="ce"><div class="ce-l">Carry out</div><div class="ce-v" style="color:${r.carryOut>0?'var(--amb)':'var(--t3)'}">${r.carryOut>0?fmtM2(r.carryOut):'—'}</div></div>
        <div class="ce"><div class="ce-l">Consommé</div><div class="ce-v">${r.consumed>0?fmtM2(r.consumed):'—'}</div></div>
        <div class="ce"><div class="ce-l">File fin mois</div><div class="ce-v" style="color:var(--neu)">${fmtM2(r.qT)}</div></div>
        <div class="ce"><div class="ce-l">EOP</div><div class="ce-v amb">${fmtM2(r.eop)}</div></div>
      </div>
      ${r.batches.length>0?`<div style="margin-top:10px;font-size:8px;color:var(--t3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:5px">Millésimes consommés</div>
      <div style="display:flex;flex-wrap:wrap;gap:5px">${r.batches.map(b=>`<span style="background:#1a1a1a;border-left:2px solid ${getC(b.label)};padding:3px 8px;font-size:9px;color:var(--t2)">${b.label} · ${fmtM2(b.amount)} · ${b.age}m</span>`).join('')}</div>`:''}
    </div>
  </div>`;
}).join('');

function toggleCard(i){
  const card=document.getElementById('card-'+i);
  card.classList.toggle('open');
}

// ══════════════════════════════════════════════════════════════
// QUEUE VIZ
// ══════════════════════════════════════════════════════════════
const maxQ=Math.max(...snaps.map(q=>q.reduce((s,b)=>s+b.amount,0)));
document.getElementById('queueViz').innerHTML=snaps.map((snap,t)=>{
  const total=snap.reduce((s,b)=>s+b.amount,0);
  const pct=maxQ>0?(total/maxQ*100).toFixed(1):0;
  const segs=snap.map(b=>{
    const w=total>0?(b.amount/total*100).toFixed(3):0;
    return `<div class="q-seg" style="width:${w}%;background:${getC(b.label)}" title="${b.label}: ${fmtM2(b.amount)}"></div>`;
  }).join('');
  return `<div class="q-row">
    <div class="q-lbl">${months[t]}</div>
    <div class="q-outer"><div class="q-bar" style="width:${pct}%">${segs}</div></div>
    <div class="q-val">${fmtM(total)}€</div>
  </div>`;
}).join('');
document.getElementById('queueLeg').innerHTML=allLbls.map((lbl,i)=>`
  <div class="li"><div class="ld" style="background:${COLS[i]}"></div>
  <span style="color:${COLS[i].replace(/[\d.]+\)$/,'1)')}">${lbl}</span></div>`).join('');

// ══════════════════════════════════════════════════════════════
// VERIFICATION
// ══════════════════════════════════════════════════════════════
const theoretic=(BOP_SEED+totalCollecte)-totalEquity;
const diff=Math.abs(remaining-theoretic);
const ok=diff<1000;
document.getElementById('verCards').innerHTML=[
  {l:'Entrées totales (Seed + Collecte)',v:fmtM2(BOP_SEED+totalCollecte),n:`Seed ${fmtM2(BOP_SEED)}  +  Collecte ${fmtM2(totalCollecte)}`,c:''},
  {l:'Equity immo (Acq − Dette)',v:fmtM2(totalEquity),n:`Acq ${fmtM2(totalAcq)}  −  Dette ${fmtM2(totalDette)}`,c:'pos'},
  {l:ok?'✓  Résidu = File réelle':'✗  Écart détecté',v:fmtM2(remaining),n:`Théorique ${fmtM2(theoretic)}  ·  Écart ${fmtM2(diff)}`,c:ok?'bok':'bko'},
].map(c=>`<div class="vc"><div class="vcl">${c.l}</div><div class="vcv ${c.c}">${c.v}</div><div class="vcn">${c.n}</div></div>`).join('');

new Chart(document.getElementById('cBal'),{
  type:'line',
  data:{labels:months,datasets:[
    {label:'EOP comptable',data:raw.map(d=>d.eop),borderColor:'rgba(180,180,180,.4)',borderDash:[4,3],borderWidth:1.5,pointRadius:3,pointBackgroundColor:'rgba(180,180,180,.4)',tension:.3},
    {label:'File FIFO',data:snaps.map(q=>q.reduce((s,b)=>s+b.amount,0)),borderColor:'rgba(240,165,0,.7)',borderWidth:1.5,pointRadius:3,pointBackgroundColor:'rgba(240,165,0,.7)',tension:.3},
    {label:'BOP',data:raw.map(d=>d.bop),borderColor:'rgba(102,153,187,.4)',borderDash:[2,4],borderWidth:1,pointRadius:2,tension:.3},
  ]},
  options:{responsive:true,plugins:{
    legend:{labels:{boxWidth:7,padding:10,color:'#555',font:{size:9}}},
    tooltip:{...tip,callbacks:{label:ctx=>` ${ctx.dataset.label}: ${fmtM2(ctx.raw)}`}}
  },scales:{x:{grid:grd,ticks:{color:'#444',maxRotation:0}},y:{grid:grd,ticks:{callback:v=>fmtM(v),color:'#444'}}}}
});

// ══════════════════════════════════════════════════════════════
// NAV
// ══════════════════════════════════════════════════════════════
function sw(id,btn){
  document.querySelectorAll('.pnl').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('pnl-'+id).classList.add('active');
  btn.classList.add('active');
  document.getElementById('scroll').scrollTop=0;
}
</script>

</body>
</html>
